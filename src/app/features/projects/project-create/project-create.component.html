<div class="space-y-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-3xl font-['Manrope'] font-black text-[#041627]">Create New Project</h1>
      <p class="text-[#515f74]">Add a new project to the MOMS workflow system</p>
    </div>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-xl p-8 card-base max-w-2xl">
    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Project Code -->
      <div>
        <label class="text-label text-[#8192a7] block mb-3">Project Code</label>
        <input
          formControlName="projectCode"
          type="text"
          placeholder="e.g., PROJ-2024-001"
          class="input-base w-full text-[#041627]"
        />
        <div *ngIf="projectForm.get('projectCode')?.invalid && projectForm.get('projectCode')?.touched" class="text-[#ba1a1a] text-xs mt-1">
          Project code is required
        </div>
      </div>

      <!-- Client Information -->
      <div class="space-y-4 p-4 bg-[#f2f4f6] rounded-lg border border-[#e8eaed]">
        <h3 class="font-['Manrope'] font-semibold text-[#041627]">Client Information</h3>
        
        <div>
          <label class="text-label text-[#8192a7] block mb-3">Client Name</label>
          <input
            formControlName="clientName"
            type="text"
            placeholder="Enter client name"
            class="input-base w-full text-[#041627]"
          />
        </div>

        <div>
          <label class="text-label text-[#8192a7] block mb-3">Email</label>
          <input
            formControlName="clientEmail"
            type="email"
            placeholder="client@example.com"
            class="input-base w-full text-[#041627]"
          />
        </div>

        <div>
          <label class="text-label text-[#8192a7] block mb-3">Phone</label>
          <input
            formControlName="clientPhone"
            type="tel"
            placeholder="+1 (555) 000-0000"
            class="input-base w-full text-[#041627]"
          />
        </div>
      </div>

      <!-- Contract Details -->
      <div class="space-y-4 p-4 bg-[#f2f4f6] rounded-lg border border-[#e8eaed]">
        <h3 class="font-['Manrope'] font-semibold text-[#041627]">Contract Details</h3>
        
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-label text-[#8192a7] block mb-3">Office</label>
            <select
              formControlName="office"
              class="input-base w-full text-[#041627]"
            >
              <option *ngFor="let office of offices" [value]="office">{{ office }}</option>
            </select>
          </div>

          <div>
            <label class="text-label text-[#8192a7] block mb-3">Contract Date</label>
            <input
              formControlName="contractDate"
              type="date"
              class="input-base w-full text-[#041627]"
            />
          </div>
        </div>

        <div>
          <label class="text-label text-[#8192a7] block mb-3">Contract Value</label>
          <input
            formControlName="contractValue"
            type="number"
            placeholder="0.00"
            class="input-base w-full text-[#041627]"
          />
        </div>
      </div>

      <!-- Description -->
      <div>
        <label class="text-label text-[#8192a7] block mb-3">Project Description</label>
        <textarea
          formControlName="description"
          placeholder="Describe the project scope and objectives..."
          class="input-base w-full text-[#041627] min-h-[100px]"
        ></textarea>
      </div>

      <!-- Actions -->
      <div class="flex gap-4 pt-4 border-t border-[#e8eaed]">
        <button
          type="button"
          (click)="cancel()"
          class="btn-secondary px-8 py-3"
        >
          Cancel
        </button>
        <button
          type="submit"
          [disabled]="projectForm.invalid || isSaving()"
          class="btn-primary px-8 py-3 flex items-center justify-center gap-2 flex-1"
        >
          <span *ngIf="!isSaving()">Create Project</span>
          <span *ngIf="isSaving()" class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
        </button>
      </div>
    </form>
  </div>
</div>
